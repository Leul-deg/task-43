<div class="row g-3">
  {% for item in items %}
    <div class="col-md-6">
      {% include "news/partials/item_card.html" %}
    </div>
  {% endfor %}
</div>

{% if pagination.pages > 1 %}
  <nav class="mt-3">
    <ul class="pagination">
      {% for page_num in pagination.iter_pages() %}
        {% if page_num %}
          <li class="page-item {% if page_num == pagination.page %}active{% endif %}">
            <a class="page-link" href="{{ url_for('news.index', page=page_num, **filters) }}" hx-get="{{ url_for('news.index', page=page_num, **filters) }}" hx-target="#news-results" hx-swap="innerHTML">{{ page_num }}</a>
          </li>
        {% else %}
          <li class="page-item disabled"><span class="page-link">…</span></li>
        {% endif %}
      {% endfor %}
    </ul>
  </nav>
{% endif %}
