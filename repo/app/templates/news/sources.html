{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">News Sources</h3>
  <a class="btn btn-outline-secondary" href="{{ url_for('news.index') }}">Back</a>
</div>

<div class="card mb-4">
  <div class="card-body">
    <form method="post" action="{{ url_for('news.create_source') }}" class="row g-3">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="col-md-3">
        <label class="form-label">Name</label>
        <input class="form-control" name="name" required>
      </div>
      <div class="col-md-2">
        <label class="form-label">Type</label>
        <select class="form-select" name="source_type" required>
          <option value="rss">rss</option>
          <option value="atom">atom</option>
          <option value="xml">xml</option>
          <option value="json">json</option>
          <option value="html">html</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label">File Prefix</label>
        <input class="form-control" name="filename_prefix" placeholder="e.g. espn">
      </div>
      <div class="col-md-2">
        <label class="form-label">Parsing Rules (JSON)</label>
        <input class="form-control" name="parsing_rules">
      </div>
      <div class="col-md-2 form-check mt-4">
        <input class="form-check-input" type="checkbox" name="is_allowed" checked>
        <label class="form-check-label">Allowed</label>
      </div>
      <div class="col-md-1 d-grid">
        <label class="form-label">&nbsp;</label>
        <button class="btn btn-primary" type="submit">Add</button>
      </div>
    </form>
  </div>
</div>

<div class="card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-striped mb-0">
        <thead>
          <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Prefix</th>
            <th>Allowed</th>
            <th>Rules</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {% for source in sources %}
            {% include "news/partials/source_row.html" %}
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
