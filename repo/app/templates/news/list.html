{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">News</h3>
  {% if current_user and current_user.role == 'admin' %}
    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary" href="{{ url_for('news.sources') }}">Sources</a>
      <a class="btn btn-outline-secondary" href="{{ url_for('news.logs') }}">Logs</a>
      <a class="btn btn-outline-secondary" href="{{ url_for('news.quarantine') }}">Quarantine</a>
    </div>
  {% endif %}
</div>

<div class="card mb-4">
  <div class="card-body">
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Source</label>
        <select name="source_id" class="form-select" hx-get="{{ url_for('news.index') }}" hx-trigger="change" hx-target="#news-results" hx-include="[name='source_id'],[name='date_from'],[name='date_to']">
          <option value="">All</option>
          {% for source in sources %}
            <option value="{{ source.id }}" {% if filters.source_id == source.id|string %}selected{% endif %}>{{ source.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">Date From</label>
        <input type="date" name="date_from" value="{{ filters.date_from }}" class="form-control" hx-get="{{ url_for('news.index') }}" hx-trigger="change" hx-target="#news-results" hx-include="[name='source_id'],[name='date_from'],[name='date_to']">
      </div>
      <div class="col-md-4">
        <label class="form-label">Date To</label>
        <input type="date" name="date_to" value="{{ filters.date_to }}" class="form-control" hx-get="{{ url_for('news.index') }}" hx-trigger="change" hx-target="#news-results" hx-include="[name='source_id'],[name='date_from'],[name='date_to']">
      </div>
    </div>
  </div>
</div>

<div id="news-results">
  {% include "news/partials/results.html" %}
</div>
{% endblock %}
