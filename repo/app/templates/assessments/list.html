{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Assessments</h3>
</div>

{% if user and user.role == 'trainer' %}
  <div class="card mb-4">
    <div class="card-body">
      <form method="post" action="{{ url_for('assessments.create_assessment') }}" class="row g-3">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="col-md-4">
          <label class="form-label">Title</label>
          <input class="form-control" name="title" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Time Limit (min)</label>
          <input class="form-control" name="time_limit_minutes">
        </div>
        <div class="col-md-4">
          <label class="form-label">Passing %</label>
          <input class="form-control" name="passing_score_percent" value="70">
        </div>
        <div class="col-12">
          <label class="form-label">Description</label>
          <textarea class="form-control" name="description"></textarea>
        </div>
        <div class="col-md-2 form-check mt-4">
          <input class="form-check-input" type="checkbox" name="is_published">
          <label class="form-check-label">Published</label>
        </div>
        <div class="col-md-3 d-grid">
          <label class="form-label">&nbsp;</label>
          <button class="btn btn-primary" type="submit">Create</button>
        </div>
      </form>
    </div>
  </div>
{% endif %}

<div class="row g-3">
  {% for assessment in assessments %}
    <div class="col-md-6">
      <div class="card h-100">
        <div class="card-body">
          <h5 class="card-title"><a href="{{ url_for('assessments.detail', assessment_id=assessment.id) }}">{{ assessment.title }}</a></h5>
          <p class="card-text text-muted">{{ assessment.description }}</p>
          <span class="badge bg-secondary">{{ 'Published' if assessment.is_published else 'Draft' }}</span>
        </div>
      </div>
    </div>
  {% endfor %}
</div>
{% endblock %}
