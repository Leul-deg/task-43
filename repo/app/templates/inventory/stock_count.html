{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Stock Count</h3>
  <a class="btn btn-outline-secondary" href="{{ url_for('inventory.index') }}">Back</a>
</div>

<div class="card">
  <div class="card-body">
    <form method="post" action="{{ url_for('inventory.submit_stock_count') }}" id="stock-count-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Batch</label>
          <select class="form-select" name="batch_id" id="batch-select" required>
            {% for batch in batches %}
              <option value="{{ batch.id }}" data-expected="{{ batch.quantity }}">Batch {{ batch.id }} (Qty {{ batch.quantity }})</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Expected Qty</label>
          <input class="form-control" name="expected_qty" id="expected-qty" readonly>
        </div>
        <div class="col-md-3">
          <label class="form-label">Counted Qty</label>
          <input class="form-control" name="counted_qty" id="counted-qty" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Variance</label>
          <input class="form-control" id="variance" readonly>
        </div>
        <div class="col-md-6">
          <label class="form-label">Variance Reason (required if >2% or >10 units)</label>
          <textarea class="form-control" name="variance_reason" id="variance-reason" rows="2"></textarea>
        </div>
      </div>
      <div class="mt-3">
        <button class="btn btn-primary" type="submit">Submit Count</button>
      </div>
    </form>
  </div>
</div>

<script>
  const batchSelect = document.getElementById('batch-select');
  const expectedQty = document.getElementById('expected-qty');
  const countedQty = document.getElementById('counted-qty');
  const variance = document.getElementById('variance');

  function updateExpected() {
    const selected = batchSelect.options[batchSelect.selectedIndex];
    expectedQty.value = selected.getAttribute('data-expected') || 0;
    updateVariance();
  }

  function updateVariance() {
    const expected = parseFloat(expectedQty.value || 0);
    const counted = parseFloat(countedQty.value || 0);
    const diff = counted - expected;
    variance.value = diff.toFixed(2);
  }

  batchSelect.addEventListener('change', updateExpected);
  countedQty.addEventListener('input', updateVariance);
  updateExpected();
</script>
{% endblock %}
