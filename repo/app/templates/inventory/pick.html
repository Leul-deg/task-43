{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Pick Recommendation - {{ variant.sku }}</h3>
  <a class="btn btn-outline-secondary" href="{{ url_for('inventory.batches') }}">Back</a>
</div>

<div class="card">
  <div class="card-body">
    <div class="table-responsive">
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Batch ID</th>
            <th>Quantity</th>
            <th>Expiration</th>
          </tr>
        </thead>
        <tbody>
          {% for batch in batches %}
            <tr>
              <td>{{ batch.id }}</td>
              <td>{{ batch.quantity }}</td>
              <td>{{ batch.expiration_date or '—' }}</td>
            </tr>
          {% else %}
            <tr>
              <td colspan="3" class="text-muted">No batches for this variant.</td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
