<div class="row g-3">
  {% for result in results %}
    <div class="col-12">
      <div class="card">
        <div class="card-body">
          <div class="d-flex justify-content-between">
            <h5 class="card-title mb-1">
              <a href="{{ result.link }}">{{ result.title }}</a>
            </h5>
            <span class="badge bg-secondary text-uppercase">{{ result.type }}</span>
          </div>
          <p class="card-text">{{ result.snippet }}</p>
        </div>
      </div>
    </div>
  {% else %}
    <p class="text-muted">No results found.</p>
  {% endfor %}
</div>

{% if total_pages > 1 %}
  <nav class="mt-3">
    <ul class="pagination">
      {% for page_num in range(1, total_pages + 1) %}
        <li class="page-item {% if page_num == page %}active{% endif %}">
          <a class="page-link" href="{{ url_for('search.index', page=page_num, q=q, type=type, category_id=category_id, tag_id=tag_id, min_price=min_price, max_price=max_price, date_from=date_from, date_to=date_to, sort=sort) }}" hx-get="{{ url_for('search.index', page=page_num, q=q, type=type, category_id=category_id, tag_id=tag_id, min_price=min_price, max_price=max_price, date_from=date_from, date_to=date_to, sort=sort) }}" hx-target="#results" hx-swap="innerHTML">{{ page_num }}</a>
        </li>
      {% endfor %}
    </ul>
  </nav>
{% endif %}
