{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">{{ 'Edit Product' if product else 'New Product' }}</h3>
  <a class="btn btn-outline-secondary" href="{{ url_for('products.index') }}">Back</a>
</div>

<form method="post" action="{{ url_for('products.create_product') if not product else url_for('products.update_product', product_id=product.id) }}" enctype="multipart/form-data" {% if product %}hx-put="{{ url_for('products.update_product', product_id=product.id) }}" hx-target="#product-detail" hx-swap="outerHTML"{% endif %}>
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="card mb-4">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Name</label>
          <input class="form-control" name="name" value="{{ product.name if product else '' }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Slug</label>
          <input class="form-control" name="slug" value="{{ product.slug if product else '' }}">
        </div>
        <div class="col-md-12">
          <label class="form-label">Description</label>
          <textarea class="form-control" name="description" rows="4">{{ product.description if product else '' }}</textarea>
        </div>
        <div class="col-md-4">
          <label class="form-label">Purchase Limit</label>
          <input class="form-control" name="purchase_limit" value="{{ product.purchase_limit if product else '' }}">
        </div>
        <div class="col-md-4">
          <label class="form-label">Tags</label>
          <input class="form-control" name="tags" value="{{ product.tags|map(attribute='name')|join(', ') if product else '' }}" placeholder="comma-separated">
        </div>
        <div class="col-md-4">
          <label class="form-label">Image</label>
          <input type="file" class="form-control" name="primary_image">
        </div>
        <div class="col-md-4 form-check">
          <input class="form-check-input" type="checkbox" name="is_published" {% if product and product.is_published %}checked{% endif %}>
          <label class="form-check-label">Published</label>
        </div>
      </div>
    </div>
  </div>

  {% if not product %}
    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title">Primary Variant</h5>
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">SKU</label>
            <input class="form-control" name="sku" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Base Price</label>
            <input class="form-control" name="base_price" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Category</label>
            <select class="form-select" name="category_id">
              <option value="">None</option>
              {% for category in categories %}
                <option value="{{ category.id }}">{{ category.name }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
      </div>
    </div>
  {% endif %}

  {% if not product %}
    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title">Tiered Pricing</h5>
        <div id="tiered-rows">
          <div class="row g-2 mb-2 tiered-row">
            <div class="col-md-4">
              <input class="form-control" name="tiered_min[]" placeholder="Min quantity">
            </div>
            <div class="col-md-4">
              <input class="form-control" name="tiered_price[]" placeholder="Unit price">
            </div>
          </div>
        </div>
        <button type="button" class="btn btn-sm btn-outline-secondary" id="add-tier">Add tier</button>
      </div>
    </div>
  {% endif %}

  <button class="btn btn-primary" type="submit">Save</button>
</form>

<script>
  const addTierButton = document.getElementById('add-tier');
  if (addTierButton) {
    addTierButton.addEventListener('click', () => {
      const container = document.getElementById('tiered-rows');
      const row = document.createElement('div');
      row.className = 'row g-2 mb-2 tiered-row';
      row.innerHTML = `
        <div class="col-md-4"><input class="form-control" name="tiered_min[]" placeholder="Min quantity"></div>
        <div class="col-md-4"><input class="form-control" name="tiered_price[]" placeholder="Unit price"></div>
      `;
      container.appendChild(row);
    });
  }
</script>
{% endblock %}
