{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Users</h3>
  <a class="btn btn-outline-secondary" href="{{ url_for('admin.index') }}">Back</a>
</div>

<div class="card mb-4">
  <div class="card-body">
    <form method="post" action="{{ url_for('admin.create_user') }}" class="row g-3">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="col-md-3">
        <label class="form-label">Username</label>
        <input class="form-control" name="username" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Role</label>
        <select class="form-select" name="role">
          <option value="admin">admin</option>
          <option value="content_editor">content_editor</option>
          <option value="inventory_manager">inventory_manager</option>
          <option value="trainer">trainer</option>
          <option value="staff">staff</option>
        </select>
      </div>
      <div class="col-md-3 d-grid">
        <label class="form-label">&nbsp;</label>
        <button class="btn btn-primary" type="submit">Create</button>
      </div>
    </form>
  </div>
</div>

<div class="table-responsive">
  <table class="table table-striped">
    <thead>
      <tr>
        <th>Username</th>
        <th>Role</th>
        <th>Status</th>
        <th>Created</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {% for user in users %}
        <tr>
          <td>{{ user.username }}</td>
          <td>{{ user.role }}</td>
          <td>{{ 'Locked' if user.is_locked else 'Active' }}</td>
          <td>{{ user.created_at }}</td>
          <td class="text-end">
            {% if user.is_locked %}
              <form method="post" action="{{ url_for('admin.unlock_user', user_id=user.id) }}" class="d-inline">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button class="btn btn-sm btn-outline-success" type="submit">Unlock</button>
              </form>
            {% else %}
              <form method="post" action="{{ url_for('admin.lock_user', user_id=user.id) }}" class="d-inline">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button class="btn btn-sm btn-outline-danger" type="submit">Lock</button>
              </form>
            {% endif %}
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
