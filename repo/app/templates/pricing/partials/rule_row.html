<tr id="rule-{{ rule.id }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <td>{{ rule.variant_id }}</td>
  <td>
    <select name="rule_type" class="form-select form-select-sm" hx-put="{{ url_for('pricing.update_rule', rule_id=rule.id) }}" hx-trigger="change" hx-include="#rule-{{ rule.id }} input, #rule-{{ rule.id }} select" hx-target="#rule-{{ rule.id }}" hx-swap="outerHTML">
      <option value="discount" {% if rule.rule_type == 'discount' %}selected{% endif %}>Discount</option>
      <option value="markup" {% if rule.rule_type == 'markup' %}selected{% endif %}>Markup</option>
    </select>
  </td>
  <td>
    <input type="number" step="0.01" name="value" class="form-control form-control-sm" value="{{ rule.value }}" hx-put="{{ url_for('pricing.update_rule', rule_id=rule.id) }}" hx-trigger="change" hx-include="#rule-{{ rule.id }} input, #rule-{{ rule.id }} select" hx-target="#rule-{{ rule.id }}" hx-swap="outerHTML">
  </td>
  <td>
    <input type="date" name="start_date" class="form-control form-control-sm" value="{{ rule.start_date }}" hx-put="{{ url_for('pricing.update_rule', rule_id=rule.id) }}" hx-trigger="change" hx-include="#rule-{{ rule.id }} input, #rule-{{ rule.id }} select" hx-target="#rule-{{ rule.id }}" hx-swap="outerHTML">
  </td>
  <td>
    <input type="date" name="end_date" class="form-control form-control-sm" value="{{ rule.end_date }}" hx-put="{{ url_for('pricing.update_rule', rule_id=rule.id) }}" hx-trigger="change" hx-include="#rule-{{ rule.id }} input, #rule-{{ rule.id }} select" hx-target="#rule-{{ rule.id }}" hx-swap="outerHTML">
  </td>
  <td>
    <div class="d-flex gap-1">
      <input type="number" name="advance_min_hours" class="form-control form-control-sm" value="{{ rule.advance_min_hours }}" hx-put="{{ url_for('pricing.update_rule', rule_id=rule.id) }}" hx-trigger="change" hx-include="#rule-{{ rule.id }} input, #rule-{{ rule.id }} select" hx-target="#rule-{{ rule.id }}" hx-swap="outerHTML">
      <input type="number" name="advance_max_days" class="form-control form-control-sm" value="{{ rule.advance_max_days }}" hx-put="{{ url_for('pricing.update_rule', rule_id=rule.id) }}" hx-trigger="change" hx-include="#rule-{{ rule.id }} input, #rule-{{ rule.id }} select" hx-target="#rule-{{ rule.id }}" hx-swap="outerHTML">
    </div>
  </td>
  <td class="text-end">
    <button class="btn btn-sm btn-outline-danger" hx-delete="{{ url_for('pricing.delete_rule', rule_id=rule.id) }}" hx-include="#rule-{{ rule.id }} input" hx-target="#rule-{{ rule.id }}" hx-swap="outerHTML">Delete</button>
  </td>
</tr>
