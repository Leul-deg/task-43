{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Pricing Rules</h3>
</div>

<div class="card mb-4">
  <div class="card-body">
    <form method="post" action="{{ url_for('pricing.create_rule') }}" class="row g-3">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="col-md-3">
        <label class="form-label">Variant</label>
        <select name="variant_id" class="form-select" required>
          {% for variant in variants %}
            <option value="{{ variant.id }}">{{ variant.sku }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label">Type</label>
        <select name="rule_type" class="form-select" required>
          <option value="discount">Discount</option>
          <option value="markup">Markup</option>
        </select>
      </div>
      <div class="col-md-2">
        <label class="form-label">Value (%)</label>
        <input type="number" step="0.01" name="value" class="form-control" required>
      </div>
      <div class="col-md-2">
        <label class="form-label">Start</label>
        <input type="date" name="start_date" class="form-control" required>
      </div>
      <div class="col-md-2">
        <label class="form-label">End</label>
        <input type="date" name="end_date" class="form-control" required>
      </div>
      <div class="col-md-1 d-grid">
        <label class="form-label">&nbsp;</label>
        <button class="btn btn-primary" type="submit">Add</button>
      </div>
      <div class="col-md-2">
        <label class="form-label">Min Minutes</label>
        <input type="number" name="min_booking_minutes" class="form-control" value="60">
      </div>
      <div class="col-md-2">
        <label class="form-label">Advance Min Hours</label>
        <input type="number" name="advance_min_hours" class="form-control" value="2">
      </div>
      <div class="col-md-2">
        <label class="form-label">Advance Max Days</label>
        <input type="number" name="advance_max_days" class="form-control" value="60">
      </div>
    </form>
  </div>
</div>

<div class="card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-striped mb-0">
        <thead>
          <tr>
            <th>Variant</th>
            <th>Type</th>
            <th>Value</th>
            <th>Start</th>
            <th>End</th>
            <th>Advance Window</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {% for rule in rules %}
            {% include "pricing/partials/rule_row.html" %}
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
